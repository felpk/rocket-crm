name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/rocket/rocket-crm
            git pull origin develop
            docker build -t rocket-crm-dev:latest .
            docker stack deploy -c docker-compose.yml rocket
            docker service update --force rocket_rocket-crm-dev
